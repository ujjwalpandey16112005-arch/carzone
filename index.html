
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATHINDA CARZONE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2>BATHINDA <span>CARZONE</span></h2>
</nav>

<!-- HERO -->
<header class="hero">
    <h1>Find Your Dream Car</h1>
    <a href="#inventory">View Cars</a>
</header>

<!-- INVENTORY -->
<section id="inventory">

    <h2>Our Cars</h2>

    <!-- FILTER BUTTONS -->
    <div class="filters">
        <button onclick="filterCars('all')">All</button>
        <button onclick="filterCars('sedan')">Sedan</button>
        <button onclick="filterCars('suv')">SUV</button>
        <button onclick="filterCars('luxury')">Luxury</button>
    </div>

    <!-- CAR GRID -->
    <div class="car-grid">

        <!-- MUSTANG -->
        <div class="car-card sedan">
            <img src="https://stimg.cardekho.com/images/carexteriorimages/930x620/Ford/Mustang/047.jpg">
            <h3>Mustang</h3>
            <p>₹25,00,000</p>
            <button onclick="inquire('Mustang')">Inquire</button>
        </div>

        <!-- FORTUNER -->
        <div class="car-card suv">
            <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf">
            <h3>Fortuner Legender</h3>
            <p>₹42,00,000</p>
            <button onclick="inquire('Fortuner Legender')">Inquire</button>
        </div>

        <!-- BMW -->
        <div class="car-card luxury">
            <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e">
            <h3>BMW 5 Series</h3>
            <p>₹55,00,000</p>
            <button onclick="inquire('BMW 5 Series')">Inquire</button>
        </div>

        <!-- POLO -->
        <div class="car-card sedan">
            <img src="https://images.unsplash.com/photo-1619767886558-efdc259cde1a">
            <h3>Volkswagen Polo GT</h3>
            <p>₹5,50,000</p>
            <button onclick="inquire('Volkswagen Polo')">Inquire</button>
        </div>

    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>📍 Bathinda, Punjab</p>
    <p>📞 +91 8264561611</p>
</footer>

<script src="script.js"></script>

</body>
</html>
