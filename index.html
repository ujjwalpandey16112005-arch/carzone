<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carzone Bathinda | Premium Cars</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* --- SITE STYLES --- */
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; }
        header { background: #222; color: white; padding: 40px 20px; text-align: center; }
        .filters { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .filter-btn { padding: 12px 25px; border: 2px solid #333; border-radius: 30px; cursor: pointer; background: white; font-weight: 600; transition: 0.3s; }
        .filter-btn.active { background: #ff4757; color: white; border-color: #ff4757; }
        
        .car-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .car-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.4s; position: relative; border: 1px solid #eee; }
        .car-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        .car-card img { width: 100%; height: 220px; object-fit: cover; display: block; background: #ddd; }
        
        .car-info { padding: 20px; text-align: left; }
        .car-info h3 { margin: 0 0 10px; font-size: 1.4rem; color: #333; }
        .price { color: #ff4757; font-weight: bold; font-size: 1.3rem; margin: 10px 0; }
        .inquire-btn { background: #25d366; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; font-size: 1rem; transition: 0.3s; }
        .inquire-btn:hover { background: #128c7e; transform: scale(1.02); }
        .tag { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.9); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }

        /* --- CUSTOM CHATBOT STYLES --- */
        #chatbot-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: #ff4757; color: white;
            border: none; border-radius: 50%;
            width: 60px; height: 60px;
            font-size: 24px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s; z-index: 1000;
        }
        #chatbot-btn:hover { transform: scale(1.1); background: #e8414e; }
        
        #chat-window {
            position: fixed; bottom: 100px; right: 30px;
            width: 320px; height: 400px;
            background: white; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: none; flex-direction: column;
            overflow: hidden; z-index: 1000;
            border: 1px solid #ddd;
        }
        
        .chat-header {
            background: #222; color: white;
            padding: 15px; font-weight: 600;
            display: flex; justify-content: space-between;
            align-items: center;
        }
        .close-chat { cursor: pointer; color: #ff4757; font-weight: bold; }
        
        #chat-messages {
            flex-grow: 1; padding: 15px;
            overflow-y: auto; background: #f8f9fa;
            display: flex; flex-direction: column; gap: 10px;
        }
        
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 0.9rem; }
        .bot-msg { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-msg { background: #ff4757; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .chat-input-area {
            display: flex; padding: 10px; border-top: 1px solid #eee; background: white;
        }
        .chat-input-area input {
            flex-grow: 1; border: 1px solid #ccc;
            border-radius: 20px; padding: 10px 15px;
            outline: none; font-family: 'Poppins', sans-serif;
        }
        .chat-input-area button {
            background: #222; color: white; border: none;
            padding: 10px 15px; margin-left: 10px;
            border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .chat-input-area button:hover { background: #ff4757; }
    </style>
</head>
<body>

<header>
    <h1>Carzone Bathinda</h1>
    <p>Premium Pre-owned Cars at Best Prices</p>
</header>

<div class="filters">
    <button class="filter-btn active" onclick="filterCars('all')">All Cars</button>
    <button class="filter-btn" onclick="filterCars('sedan')">Sedan</button>
    <button class="filter-btn" onclick="filterCars('suv')">SUV</button>
</div>

<div class="car-grid" id="carGrid">
    <div class="car-card sedan">
        <span class="tag">Luxury</span>
        <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=1000&auto=format&fit=crop" alt="BMW M5">
        <div class="car-info">
            <h3>BMW M5</h3>
            <p class="price">₹ 1.5 Crore</p>
            <button class="inquire-btn" onclick="handleInquiry(this)">Inquire Now</button>
        </div>
    </div>

    <div class="car-card sedan">
        <span class="tag">Sport</span>
        <img src="https://images.unsplash.com/photo-1584345604482-813588d8e417?q=80&w=1000&auto=format&fit=crop" alt="Ford Mustang">
        <div class="car-info">
            <h3>Ford Mustang</h3>
            <p class="price">₹ 75 Lakh</p>
            <button class="inquire-btn" onclick="handleInquiry(this)">Inquire Now</button>
        </div>
    </div>

    <div class="car-card suv">
        <span class="tag">Best Seller</span>
        <img src="https://images.unsplash.com/photo-1663155182963-71869e061803?q=80&w=1000&auto=format&fit=crop" alt="Mahindra Scorpio">
        <div class="car-info">
            <h3>Mahindra Scorpio</h3>
            <p class="price">₹ 18 Lakh</p>
            <button class="inquire-btn" onclick="handleInquiry(this)">Inquire Now</button>
        </div>
    </div>
</div>

<!-- --- CUSTOM CHATBOT UI --- -->
<button id="chatbot-btn" onclick="toggleChat()">💬</button>

<div id="chat-window">
    <div class="chat-header">
        <span>Carzone Assistant</span>
        <span class="close-chat" onclick="toggleChat()">✖</span>
    </div>
    <div id="chat-messages">
        <div class="msg bot-msg">Sat Sri Akal! Welcome to Carzone. How can I help you find your dream car today?</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Ask about a car...">
        <button onclick="sendUserMessage()">Send</button>
    </div>
</div>

<script>
    // ==========================================
    // 🔴 API KEYS CONFIGURATION 🔴
    // ==========================================
    // Aapki Gemini AI Key yahan daal di gayi hai:
    const API_KEY = "AIzaSyCutFXPfRExSQ0X4zjtIFxlKAjo8DHrlcM"; 
    
    // Yahan apni Web3Forms ki access key daalein jab aap unki site se generate kar lein:
    const EMAIL_ACCESS_KEY = "YAHAN_WEB3FORMS_KI_KEY_AAYEGI"; 
    // ==========================================

    // --- EMAIL NOTIFICATION SYSTEM (Web3Forms) ---
    function sendEmailToOwner(customerMessage, type) {
        if(EMAIL_ACCESS_KEY === "YAHAN_WEB3FORMS_KI_KEY_AAYEGI") return; // Key nahi hai toh email nahi jayega

        fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({
                access_key: EMAIL_ACCESS_KEY,
                subject: `New ${type} from Carzone Website!`,
                message: `You have a new update from a customer:\n\nDetails: ${customerMessage}`
            })
        })
        .then(response => response.json())
        .then(data => console.log("Email sent successfully!"))
        .catch(error => console.log("Email failed", error));
    }

    // --- SITE LOGIC ---
    function filterCars(category) {
        console.log("Filtering for: " + category);
    }
    
    function handleInquiry(btn) {
        const carName = btn.parentElement.querySelector('h3').innerText;
        sendEmailToOwner(`Customer clicked Inquire Now for: ${carName}`, "Car Inquiry");
        alert("Thank you for your interest! Our team has been notified and will contact you shortly.");
    }

    // --- SMART AI CHATBOT LOGIC ---
    function toggleChat() {
        const chatWindow = document.getElementById('chat-window');
        chatWindow.style.display = (chatWindow.style.display === 'none' || chatWindow.style.display === '') ? 'flex' : 'none';
    }

    async function sendUserMessage() {
        const inputField = document.getElementById('chat-input');
        const messageText = inputField.value.trim();
        
        if (messageText === "") return;

        // User ka message dikhayein
        appendMessage(messageText, 'user-msg');
        inputField.value = '';

        // Email notification bhejna
        sendEmailToOwner(`Customer asked in chat: "${messageText}"`, "Chatbot Message");

        // Typing indicator
        const chatBox = document.getElementById('chat-messages');
        const typingDiv = document.createElement('div');
        typingDiv.className = `msg bot-msg`;
        typingDiv.id = `typing-indicator`;
        typingDiv.textContent = "AI is thinking...";
        chatBox.appendChild(typingDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        // AI se reply
        await getAIReply(messageText);
    }

    function appendMessage(text, className) {
        const chatBox = document.getElementById('chat-messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${className}`;
        msgDiv.innerHTML = text; 
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; 
    }

    async function getAIReply(userMessage) {
        const systemPrompt = `You are a helpful and polite car sales assistant for 'Carzone Bathinda'. 
        A customer asked: "${userMessage}". 
        Give a short, accurate answer about the car they asked for (max 3-4 lines). 
        If they ask about cars not in the showroom, give general specs and say we can arrange it.`;

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: systemPrompt }] }]
                })
            });

            const data = await response.json();
            
            document.getElementById('typing-indicator').remove();

            if(data.candidates && data.candidates[0].content.parts[0].text) {
                let botReply = data.candidates[0].content.parts[0].text;
                botReply = botReply.replace(/\*\*/g, ''); 
                appendMessage(botReply, 'bot-msg');
            } else {
                appendMessage("Sorry, main samajh nahi paya.", 'bot-msg');
            }

        } catch (error) {
            console.error("API Error:", error);
            document.getElementById('typing-indicator')?.remove();
            appendMessage("Network error. Kripya baad mein try karein.", 'bot-msg');
        }
    }

    document.getElementById('chat-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendUserMessage();
    });
</script>

</body>
</html>
